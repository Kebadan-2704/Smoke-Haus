<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Smokehouse silhouette -->
  <rect x="50" y="100" width="100" height="70" rx="2" fill="#581A0D"/>
  <polygon points="100,55 45,100 155,100" fill="#3D1108"/>
  <!-- Chimney -->
  <rect x="120" y="60" width="18" height="40" fill="#3D1108"/>
  <!-- Three smoke curls from logo -->
  <g fill="none" stroke="#C1552B" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M 125 58 C 122 45 130 42 127 28 C 124 14 132 10 129 0"/>
    <path d="M 133 55 C 130 40 138 37 135 22 C 132 8 140 4 137 -6"/>
    <path d="M 141 58 C 138 48 146 45 143 35 C 140 25 148 22 145 12"/>
  </g>
  <!-- Meat on top of house (brisket icon) -->
  <ellipse cx="80" cy="95" rx="22" ry="8" fill="#C1552B" opacity="0.7"/>
  <!-- Door -->
  <rect x="88" y="130" width="24" height="40" rx="2" fill="#1C1613"/>
  <!-- Windows -->
  <rect x="60" y="120" width="16" height="14" rx="1" fill="#C99A3E" opacity="0.6"/>
  <rect x="124" y="120" width="16" height="14" rx="1" fill="#C99A3E" opacity="0.6"/>
</svg>
